version: "3.9"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: ai_eval_postgres
    environment:
      POSTGRES_DB: ai_eval_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis（缓存 + Celery 任务队列）
  redis:
    image: redis:7-alpine
    container_name: ai_eval_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO（文件存储，兼容 S3，用于存放报告文件）
  minio:
    image: minio/minio:latest
    container_name: ai_eval_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # 控制台
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI 后端（开发模式）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai_eval_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/ai_eval_db
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
    volumes:
      - ./backend:/app  # 热重载
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker（异步任务：工具执行）
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ai_eval_celery
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/ai_eval_db
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A core.celery_app worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
  minio_data:
